<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Olá, Lucas</h1>
            <button class="icon-btn settings-btn">⚙️</button>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="task-input" placeholder="Incluir tarefa">
                <button id="add-btn">+</button>
            </div>

            <section class="tasks-section">
                <h2>Tarefas do dia</h2>
                <div id="tasks-container">
                    <!-- Tarefas geradas aparecerão aqui -->
                </div>
            </section>

            <section class="pet-card">
                <div class="pet-header">
                    <h2>Meu pet</h2>
                    <div class="coin-counter">
                        <span class="coin-icon">🪙</span>
                        <span id="coin-count">0</span>
                    </div>
                </div>

                <div class="pet-display">
                    <h3>Anakin</h3>
                    <div id="pet-sprite" class="sprite-animacao" title="Pet Anakin"></div>
                </div>

                <button class="icon-btn store-btn">🏪</button>
            </section>
            <div class="shop-section"
                style="background: white; padding: 16px; border-radius: 16px; margin-top: 20px; text-align: center;">
                <h3>Lojinha do Anakin</h3>
                <p>Ajude o gato a conseguir sua fantasia!</p>
                <br>
                <button id="buy-dracula-btn"
                    style="padding: 10px 20px; border-radius: 8px; border: none; background: #8EB4D4; color: white; cursor: pointer; font-weight: bold;">
                    Comprar Drácula (50 🪙)
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active">🏠</button>
            <button class="nav-item">📋</button>
            <button class="nav-item">👤</button>
        </nav>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
