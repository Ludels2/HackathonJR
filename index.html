<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dopamine Quest</title>
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #00CEC9;
            --bg: #F5F6FA;
            --text: #2D3436;
            --card: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #f1f2f6;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .coins { color: #f39c12; }
        .input-area {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button.action-btn:hover { background: #5b4bc4; }
        
        /* Lista de Tarefas */
        .task-list {
            text-align: left;
            margin-bottom: 20px;
        }
        .task-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            border-left: 4px solid var(--secondary);
            animation: fadeIn 0.5s ease-in-out;
        }
        .task-item input { margin-right: 10px; transform: scale(1.3); cursor: pointer; }
        .completed { text-decoration: line-through; color: #b2bec3; opacity: 0.7; }

        /* Área do Pet */
        .pet-area {
            background: #eccc68;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .pet-emoji { font-size: 60px; margin: 0; }
        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            height: 15px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #ff7f50;
            width: 0%;
            transition: width 0.3s ease;
        }
        .pet-status { font-size: 14px; font-weight: bold; margin-top: 5px; color: #2f3542;}

        /* Loja */
        .shop-area { border-top: 2px dashed #dfe6e9; padding-top: 15px; }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f2f6;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .shop-item button {
            background: #2ed573;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <h1>⭐ Quest Helper</h1>
    
    <div class="stats-bar">
        <span class="coins">💰 <span id="coin-count">0</span></span>
        <span>Nível do Pet: <span id="pet-level">1</span></span>
    </div>

    <div class="input-area">
        <input type="text" id="task-input" placeholder="O que está te travando hoje?">
        <button class="action-btn" onclick="generateQuest()">Transformar em Missão!</button>
    </div>

    <div class="task-list" id="task-container">
        </div>

    <div class="pet-area">
        <div class="pet-emoji" id="pet-display">🐣<span id="pet-accessory"></span></div>
        <div class="progress-container">
            <div class="progress-bar" id="pet-progress"></div>
        </div>
        <div class="pet-status">Felicidade: <span id="happiness-text">0</span>%</div>
    </div>

    <div class="shop-area">
        <h3>🛒 Lojinha do Pet</h3>
        <div class="shop-item">
            <span>🎩 Cartola (50💰)</span>
            <button onclick="buyItem('🎩', 50)">Comprar</button>
        </div>
        <div class="shop-item">
            <span>🕶️ Óculos (100💰)</span>
            <button onclick="buyItem('🕶️', 100)">Comprar</button>
        </div>
        <div class="shop-item">
            <span>🦸 Capa (150💰)</span>
            <button onclick="buyItem('🦸', 150)">Comprar</button>
        </div>
    </div>
</div>

<script>
    // Variáveis do Jogo
    let coins = 0;
    let happiness = 0;
    let petLevel = 1;
    let pets = ['🐣', '🐥', '🐔', '🦅', '🐉']; // Evoluções do pet

    // Dicionário simulando a IA (MVP Hackathon)
    const iaSimulada = {
        "limpar": ["Pegue um saco de lixo grande.", "Jogue fora 5 papéis ou lixos óbvios.", "Leve copos e pratos para a pia.", "Coloque as roupas sujas no cesto."],
        "estudar": ["Pegue seu caderno e caneta.", "Abra o material na página certa.", "Leia apenas o primeiro parágrafo.", "Escreva 1 frase resumindo o que leu."],
        "default": ["Prepare o ambiente (pegue o que precisa).", "Faça a tarefa por apenas 5 minutos.", "Levante e beba um copo de água.", "Faça mais 5 minutos e anote o progresso."]
    };

    function generateQuest() {
        const input = document.getElementById('task-input').value.toLowerCase();
        const container = document.getElementById('task-container');
        container.innerHTML = ''; // Limpa tarefas antigas

        if(input.trim() === "") {
            alert("Digite alguma coisa que está te travando!");
            return;
        }

        // Simula a inteligência de identificar a palavra-chave
        let steps = iaSimulada["default"];
        if(input.includes("limpar") || input.includes("arrumar") || input.includes("quarto")) steps = iaSimulada["limpar"];
        if(input.includes("estudar") || input.includes("ler") || input.includes("trabalho")) steps = iaSimulada["estudar"];

        // Renderiza na tela
        steps.forEach((step, index) => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <input type="checkbox" onchange="completeTask(this)">
                <span>${step}</span>
            `;
            container.appendChild(div);
        });

        document.getElementById('task-input').value = ""; // Limpa o input
    }

    function completeTask(checkbox) {
        if(checkbox.checked) {
            checkbox.nextElementSibling.classList.add('completed');
            checkbox.disabled = true; // Não deixa desmarcar
            
            // Recompensas
            coins += 25;
            happiness += 25;
            
            updateUI();
            checkEvolution();
        }
    }

    function updateUI() {
        document.getElementById('coin-count').innerText = coins;
        document.getElementById('happiness-text').innerText = happiness;
        document.getElementById('pet-progress').style.width = happiness + '%';
    }

    function checkEvolution() {
        if(happiness >= 100) {
            setTimeout(() => {
                happiness = 0;
                petLevel++;
                
                // Muda o emoji se tiver evolução disponível
                if(petLevel <= pets.length) {
                    document.getElementById('pet-display').innerHTML = pets[petLevel-1] + '<span id="pet-accessory"></span>';
                }
                
                document.getElementById('pet-level').innerText = petLevel;
                updateUI();
                alert("🎉 SEU PET EVOLUIU! Continue focado!");
            }, 500); // pequeno delay para a barra encher antes de resetar
        }
    }

    function buyItem(itemEmoji, price) {
        if(coins >= price) {
            coins -= price;
            document.getElementById('pet-accessory').innerText = itemEmoji;
            updateUI();
        } else {
            alert("Falta dopamina! Conclua mais tarefas para ganhar moedas.");
        }
    }
</script>

</body>
</html>
